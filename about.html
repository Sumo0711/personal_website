<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>蘇莫 Sumo | 我的故事</title>
    <link rel="website icon" type="image/png" href="img/sumo.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code&display=swap" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #1f2937, #3c4450, #1f2937);
            background-size: 400% 400%;
            animation: gradientBG 10s ease infinite;
        }
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .glass-panel {
            background: rgba(31, 41, 55, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body class="bg-gray-900 text-white font-mono">
    
    <header class="p-6 flex justify-between items-center">
        <h1 class="text-4xl">我的故事</h1>
        <nav class="mt-4 flex space-x-4">
            <a href="projects.html" class="text-blue-400 hover:text-blue-600">作品</a>
            <a href="index.html" class="text-blue-400 hover:text-blue-600">首頁</a>
        </nav>
    </header>

    <main class="p-6 max-w-4xl mx-auto mt-12 mb-16">
        
        <section class="glass-panel p-8 md:p-12 rounded-3xl shadow-2xl mb-8">
            <h2 class="text-3xl font-bold mb-8 border-b border-blue-500 pb-4 inline-block">自傳</h2>
            
            <article class="prose prose-invert max-w-none text-gray-200 leading-loose text-lg tracking-wide">
                
                <div id="bio-content">
                    <p class="text-gray-400 animate-pulse">載入故事中...</p>
                </div>

                <p class="italic text-gray-400 mt-8">
                    No need to compare with others, just be 1% better than yourself yesterday.
                </p>
            </article>
        </section>

        <section class="max-w-4xl mx-auto mb-4 mt-8">
            <div class="video-section">
                <div class="relative rounded-2xl overflow-hidden shadow-2xl border-4 border-gray-800 transition-transform duration-500 hover:scale-[1.01]" style="padding-bottom: 56.25%; height: 0;">
                    <iframe 
                        style="position: absolute; top: 0; left: 0; width: 100%; height: 100%;"
                        src="https://www.youtube.com/embed/5rS2MupSwug" 
                        title="Sumo's Personal Introduction" 
                        frameborder="0" 
                        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
                        allowfullscreen>
                    </iframe>
                </div>
            </div>
        </section>

    </main>

    <footer class="p-6 text-center">
        &copy; 2024 蘇莫。保留所有權利。
    </footer>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            fetch('bio.txt')
                .then(response => {
                    if (!response.ok) throw new Error('找不到檔案');
                    return response.text();
                })
                .then(text => {
                    // 將 txt 內容根據換行符號切成陣列，並過濾掉空白段落
                    const paragraphs = text.split(/\n+/).filter(p => p.trim() !== '');
                    
                    // 將每一段文字加上 <p class="mb-6">
                    const htmlContent = paragraphs.map(p => {
                        return `<p class="mb-6">${p}</p>`;
                    }).join('');
                    
                    // 將組合好的 HTML 寫入容器中
                    document.getElementById('bio-content').innerHTML = htmlContent;
                })
                .catch(error => {
                    console.error('讀取自傳失敗:', error);
                    document.getElementById('bio-content').innerHTML = '<p class="text-red-400 mb-6">目前無法載入自傳內容，請稍後再試。如果您是在本機直接開啟 HTML 檔案，請使用 Live Server 擴充功能來預覽。</p>';
                });
        });
    </script>
</body>
</html>
